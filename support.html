.background {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
   filter: blur(5px) brightness(50%);

  height: 100%;
  background: url('background2.jpg') no-repeat center center/cover;

}
    </style>
  <script>
  let timeout;
  let autoMove = false;
  let currentX = 0, currentY = 0;
  let targetX = 0, targetY = 0;
  const scale = 1.1; // уменьшили масштаб для менее сильного приближения
  const speed = 0.05; // Коэффициент плавности движения

  // Функция для расчёта максимальных смещений по X и Y
  function updateBounds(background) {
    const maxX = (background.offsetWidth * scale - window.innerWidth) / 2;
    const maxY = (background.offsetHeight * scale - window.innerHeight) / 2;
    return { maxX, maxY };
  }

  // Функция для ограничения значения в заданном диапазоне
  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  document.addEventListener('mousemove', function(e) {
    const background = document.querySelector('.background');
    if (!background) return;

    const { maxX, maxY } = updateBounds(background);

    // Расчёт смещения с эффектом параллакса:
    // Когда курсор слева — фон смещается вправо (и наоборот)
    const newX = -maxX * ((e.clientX / window.innerWidth) - 0.5) * 2;
    const newY = -maxY * ((e.clientY / window.innerHeight) - 0.5) * 2;

    // Обновляем текущие и целевые позиции
    currentX = clamp(newX, -maxX, maxX);
    currentY = clamp(newY, -maxY, maxY);
    targetX = currentX;
    targetY = currentY;

    background.style.transform = `translate(${currentX}px, ${currentY}px) scale(${scale})`;

    // Если мышь двигается, отменяем авто-анимацию
    autoMove = false;
    clearTimeout(timeout);
    timeout = setTimeout(() => {
      autoMove = true;
      setRandomTarget(background);
      animateBackground(background);
    }, 500);
  });

  // Устанавливаем случайную целевую позицию в пределах допустимых границ
  function setRandomTarget(background) {
    const { maxX, maxY } = updateBounds(background);
    targetX = clamp(currentX + (Math.random() - 0.5) * 100, -maxX, maxX);
    targetY = clamp(currentY + (Math.random() - 0.5) * 100, -maxY, maxY);
  }

  // Анимация плавного перехода к целевой точке
  function animateBackground(background) {
    if (!autoMove) return;
    const { maxX, maxY } = updateBounds(background);

    currentX += (targetX - currentX) * speed;
    currentY += (targetY - currentY) * speed;

    // Ограничиваем смещение, чтобы фон не выходил за границы
    currentX = clamp(currentX, -maxX, maxX);
    currentY = clamp(currentY, -maxY, maxY);

    background.style.transform = `translate(${currentX}px, ${currentY}px) scale(${scale})`;

    // Если почти достигли цели – выбираем новую случайную позицию
    if (Math.abs(currentX - targetX) < 1 && Math.abs(currentY - targetY) < 1) {
      setRandomTarget(background);
    }

    requestAnimationFrame(() => animateBackground(background));
  }

</script>

<script>
    // Функция смены языка с поддержкой перевода атрибутов (placeholder)
    function setLanguage(lang) {
      localStorage.setItem("language", lang); // Сохраняем язык в localStorage

      // Меняем флаг
      document.querySelector(".flag").src = lang === 'ru' ? 'ru.png' : lang === 'en' ? 'uk.png' : 'en.png';
      document.querySelector("#current-lang-text").textContent = lang === 'ru' ? "Русский" : lang === 'en' ? "English" : "Українська";

      // Перебираем элементы для перевода
      const elements = document.querySelectorAll('[data-i18n]');
      elements.forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang][key]) {
          el.innerHTML = translations[lang][key];
        }
      });

      // Переводим атрибуты placeholder
      const placeholders = document.querySelectorAll('[data-i18n-placeholder]');
      placeholders.forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        if (translations[lang][key]) {
          el.placeholder = translations[lang][key];
        }
      });
    }

    // Обработчик для открытия/закрытия меню выбора языка
    const langSelector = document.querySelector('.language-selector');
    let closeTimeout;
    langSelector.addEventListener('mouseenter', () => {
      clearTimeout(closeTimeout);
      langSelector.classList.add('open');
    });
    langSelector.addEventListener('mouseleave', () => {
      closeTimeout = setTimeout(() => {
        langSelector.classList.remove('open');
      }, 200);
    });
    document.querySelectorAll(".lang-options a").forEach(link => {
      link.addEventListener("click", (e) => {
        e.preventDefault();
        const lang = e.target.closest("a").getAttribute("href").replace("?lang=", "");
        setLanguage(lang);
      });
    });

    const translations = {

        account: "Аккаунт",
        about: "О нас",
        support: "Поддержка",

        ticketTitle: "Тикет:",

    deleteTicketButton: "<i class='fa-solid fa-trash'></i> Удалить тикет",  // Иконка для удаления
      },

        sendButton: "<i class='fa-solid fa-paper-plane'></i> Send",
        ticketTitle: "Ticket:",
        user: "You",

        messagePlaceholder: "Enter your message",
        sendMessageButton: "<i class='fa-solid fa-paper-plane'></i> Send",
        deleteTicketButton: "<i class='fa-solid fa-trash'></i> Delete Ticket"
      },
      uk: {
        buy: "Купити",
        account: "Аккаунт",
        about: "Про нас",
        support: "Підтримка",
        createTicketTitle: "Створити тікет",
        accountLoginPlaceholder: "Логін вашого акаунту",
        problemDescriptionPlaceholder: "Опишіть вашу проблему",
        sendButton: "<i class='fa-solid fa-paper-plane'></i> Надіслати",
        ticketTitle: "Тікет:",
        user: "Ви",
        techSupport: "Техпідтримка",
        messagePlaceholder: "Введіть повідомлення",
        sendMessageButton: "<i class='fa-solid fa-paper-plane'></i> Надіслати",
        deleteTicketButton: "<i class='fa-solid fa-trash'></i> Видалити тікет"
      }
    };

    // Устанавливаем язык при загрузке страницы
    const storedLanguage = localStorage.getItem("language") || "ru";
    setLanguage(storedLanguage);

    // Функция смены языка при клике по пункту меню
    function changeLanguage(event) {
      event.preventDefault();
      const lang = event.target.closest("a").getAttribute("href").replace("?lang=", "");
      setLanguage(lang);
      const langText = event.target.closest("a").getAttribute("data-text");
      const langFlag = event.target.closest("a").getAttribute("data-flag");
      document.getElementById("current-flag").src = langFlag;
      document.getElementById("current-lang-text").textContent = langText;
    }
