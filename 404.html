<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Страница не найдена</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .bsod {
            text-align: center;
        }
        h1 {
            font-size: 50px;
            margin-bottom: 20px;
        }
        p {
            font-size: 18px;
            margin: 5px 0;
        }
        .error-code {
            font-size: 36px;
            font-weight: bold;
        }
        .message {
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="bsod">
        <h1>ОШИБКА :(</h1>
        <p class="error-code">ERROR: HTTP_ERROR_404</p>
        <p class="message">Страница, которую вы ищете, не найдена. Проблема может быть вызвана повреждением ссылки или перемещением страницы.</p>
        <p>Пожалуйста, вернитесь на <a href="index.html" style="color: #1e90ff;">vrime-client.ru</a>.</p>
        <br>
        <p>Если проблема продолжает возникать, перезагрузите страницу или попробуйте позже.</p>
    </div>
</body>
</html>
