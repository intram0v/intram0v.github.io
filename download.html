<script>
  let timeout;
  let autoMove = false;
  let currentX = 0, currentY = 0;
  let targetX = 0, targetY = 0;
  const scale = 1.1; // уменьшили масштаб для менее сильного приближения
  const speed = 0.05; // Коэффициент плавности движения

  // Функция для расчёта максимальных смещений по X и Y
  function updateBounds(background) {
    const maxX = (background.offsetWidth * scale - window.innerWidth) / 2;
    const maxY = (background.offsetHeight * scale - window.innerHeight) / 2;
    return { maxX, maxY };
  }

  // Функция для ограничения значения в заданном диапазоне
  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  document.addEventListener('mousemove', function(e) {
    const background = document.querySelector('.background');
    if (!background) return;

    const { maxX, maxY } = updateBounds(background);

    // Расчёт смещения с эффектом параллакса:
    // Когда курсор слева — фон смещается вправо (и наоборот)
    const newX = -maxX * ((e.clientX / window.innerWidth) - 0.5) * 2;
    const newY = -maxY * ((e.clientY / window.innerHeight) - 0.5) * 2;

    // Обновляем текущие и целевые позиции
    currentX = clamp(newX, -maxX, maxX);
    currentY = clamp(newY, -maxY, maxY);
    targetX = currentX;
    targetY = currentY;

    background.style.transform = `translate(${currentX}px, ${currentY}px) scale(${scale})`;

    // Если мышь двигается, отменяем авто-анимацию
    autoMove = false;
    clearTimeout(timeout);
    timeout = setTimeout(() => {
      autoMove = true;
      setRandomTarget(background);
      animateBackground(background);
    }, 500);
  });

  // Устанавливаем случайную целевую позицию в пределах допустимых границ
  function setRandomTarget(background) {
    const { maxX, maxY } = updateBounds(background);
    targetX = clamp(currentX + (Math.random() - 0.5) * 100, -maxX, maxX);
    targetY = clamp(currentY + (Math.random() - 0.5) * 100, -maxY, maxY);
  }

  // Анимация плавного перехода к целевой точке
  function animateBackground(background) {
    if (!autoMove) return;
    const { maxX, maxY } = updateBounds(background);

    currentX += (targetX - currentX) * speed;
    currentY += (targetY - currentY) * speed;

    // Ограничиваем смещение, чтобы фон не выходил за границы
    currentX = clamp(currentX, -maxX, maxX);
    currentY = clamp(currentY, -maxY, maxY);

    background.style.transform = `translate(${currentX}px, ${currentY}px) scale(${scale})`;

    // Если почти достигли цели – выбираем новую случайную позицию
    if (Math.abs(currentX - targetX) < 1 && Math.abs(currentY - targetY) < 1) {
      setRandomTarget(background);
    }

    requestAnimationFrame(() => animateBackground(background));
  }

</script>

<script>
// Find the language selector element
const langSelector = document.querySelector('.language-selector');
let closeTimeout;

// Open the menu when mouse enters
langSelector.addEventListener('mouseenter', () => {
    clearTimeout(closeTimeout);
    langSelector.classList.add('open');
});

// Close the menu after 1.5 seconds when mouse leaves
langSelector.addEventListener('mouseleave', () => {
    closeTimeout = setTimeout(() => {
        langSelector.classList.remove('open');
    }, 200);
});

// Handlers for changing the language
document.querySelectorAll(".lang-options a").forEach(link => {
    link.addEventListener("click", (e) => {
        e.preventDefault();
        const lang = e.target.closest("a").getAttribute("data-lang");
        setLanguage(lang);  // Immediately apply the language
    });
});

// Translations
const translations = {
    'ru': {
        'buy': 'Купить',
        'account': 'Аккаунт',
        'about': 'О нас',
        'support': 'Поддержка',

    },
    'uk': {
        'buy': 'Купити',

        'account': 'Аккаунт',
        'about': 'Про нас',
        'support': 'Підтримка',
        'login': 'Вхід',

    },
    'en': {
        'buy': 'Buy',
        'account': 'Account',
        'about': 'About',
        'support': 'Support',

    }
};

// Language change function
function setLanguage(lang) {
    localStorage.setItem("language", lang); // Save language in localStorage

    // Change the flag and text
    const flag = lang === 'ru' ? 'ru.png' : lang === 'en' ? 'uk.png' : 'en.png';
    const langText = lang === 'ru' ? "Русский" : lang === 'en' ? "English" : "Українська";
    document.querySelector("#current-flag").src = flag;
    document.querySelector("#current-lang-text").textContent = langText;

    // Apply translations
    const elements = document.querySelectorAll('[data-i18n]');
    elements.forEach(el => {
        const key = el.getAttribute('data-i18n');
        el.textContent = translations[lang][key];
        if (el.placeholder) {
            el.placeholder = translations[lang][key + '-placeholder'] || el.placeholder;
        }
    });
}

// Get selected language from localStorage and apply it
const storedLanguage = localStorage.getItem("language") || "ru";
setLanguage(storedLanguage);
</script>
